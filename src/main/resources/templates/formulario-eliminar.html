<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Eliminación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="alert alert-danger" role="alert">
                <h4 class="alert-heading">¡Atención!</h4>
                <p>¿Estás completamente seguro de que deseas eliminar la siguiente materia?</p>
                <hr>
                <p class="mb-0">
                    <strong>ID:</strong> <span th:text="${materia.id}"></span> <br>
                    <strong>Nombre:</strong> <span th:text="${materia.nombre}"></span> <br>
                    <strong>Créditos:</strong> <span th:text="${materia.creditos}"></span>
                </p>
            </div>

            <form th:action="@{/materias/borrar/{id}(id=${materia.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-danger">Sí, eliminar materia</button>
            </form>
            <a th:href="@{/materias}" class="btn btn-secondary">Cancelar</a>
        </div>
    </div>
</div>
</body>
</html>
