<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Materia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">Editar Materia</h2>
            <form th:action="@{/materias/actualizar/{id}(id=${materia.id})}" th:object="${materia}" method="post">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre de la materia:</label>
                    <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="creditos" class="form-label">Créditos:</label>
                    <input type="number" id="creditos" th:field="*{creditos}" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Actualizar</button>
                <a th:href="@{/materias}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
